<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SUthrey's fancy bounce checker</title>

    <link rel="stylesheet"
          href="style.css">
</head>

<body>
    <div class="container">
        <h1>SUthrey's fancy bounce checker</h1>

        <div class="search-area">

            <input
                id="targetInput"
                type="number"
                placeholder="Enter floor height">

            <button onclick="findSetups()">
                Search
            </button>

            <button onclick="togglePreferences()">
                Preferences
            </button>
            
            <button onclick="window.location.href='faq.html'">
                FAQ
            </button>

        </div>

        <div id="preferencesPanel"
             class="hidden">

            <div style="
                display:flex;
                justify-content:space-between;
                align-items:center;
                margin-bottom:20px;
            ">

                <h2>
                    Ranking Preferences
                </h2>

                <button onclick="resetPreferences()">
                    Reset to Defaults
                </button>

            </div>

            <div id="preferences"></div>

        </div>

        <hr>

        <div id="results"></div>

        <script src="script.js"></script>
    </div>
</body>
