<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fance Bounce Checker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Fancy Bounce Checker</h1>

    <div class="search-area">

        <input
            id="targetInput"
            type="number"
            placeholder="Enter floor height">

        <button onclick="findSetups()">
            Search
        </button>

        <button onclick="togglePreferences()">
            Preferences
        </button>

    </div>

    <div id="preferences" class="hidden">

        <h2>Ranking Preferences</h2>

        <div class="slider-row">

            <label>
                Difficulty
            </label>

            <input
                type="range"
                min="-10"
                max="10"
                value="0"
                id="difficultyWeight">

            <span id="difficultyValue">
                0
            </span>

        </div>

        <div class="slider-row">

            <label>
                Speed
            </label>

            <input
                type="range"
                min="-10"
                max="10"
                value="0"
                id="speedWeight">

            <span id="speedValue">
                0
            </span>

        </div>

        <div class="slider-row">

            <label>
                Consistency
            </label>

            <input
                type="range"
                min="-10"
                max="10"
                value="0"
                id="consistencyWeight">

            <span id="consistencyValue">
                0
            </span>

        </div>

    </div>

    <hr>

    <div id="results">

    </div>

    <script src="script.js"></script>

</body>

</html>
